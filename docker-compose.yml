version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: santoseschein-db
    environment:
      POSTGRES_DB: santoseschein
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
